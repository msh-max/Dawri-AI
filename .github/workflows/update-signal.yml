name: Update Momentum Signal

on:
  schedule:
    # Run every day at 23:00 UTC (after US market close)
    - cron: '0 23 * * 1-5'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet yfinance pandas numpy

      - name: Update signal data
        run: python scripts/update_data.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet docs/data.json; then
            git add docs/data.json
            git commit -m "Update momentum signal data [auto]"
            git push
          else
            echo "No changes in data.json"
          fi
